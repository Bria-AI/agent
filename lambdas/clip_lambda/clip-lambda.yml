Parameters:
  BucketName:
    Type: String
  SageMakerEndpoint:
    Type: String
  CodeS3Bucket:
    Type: String
  EndpointLambdaCodeS3Key:
    Type: String
  PutObjectTriggerClipLambda:
    Type: String

Resources:
  # LambdaExecutionRole:
  #   Type: "AWS::IAM::Role"
  #   Properties:
  #     # Role properties for Lambda

  ClipLambdaFunction:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: !Ref PutObjectTriggerClipLambda
      Handler: "lambda_function.lambda_handler"
      Role: arn:aws:iam::300465780738:role/bria-agent
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref EndpointLambdaCodeS3Key
      Runtime: "python3.8"
      Environment:
        Variables:
          ENDPOINT_NAME: !Ref SageMakerEndpoint
          BUCKET_NAME: !Ref BucketName

  BucketPutTrigger:
    Type: "AWS::S3::BucketNotificationConfiguration"
    Properties:
      Bucket: !Ref BucketName
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: "s3:ObjectCreated:Put"
            Filter:
              S3Key:
                Rules:
                  - Name: "prefix"
                    Value: "images/"
            Function: !GetAtt ClipLambdaFunction.Arn

  # Lambda permission to allow S3 to invoke
  LambdaInvokePermission:
    Type: "AWS::Lambda::Permission"
    Properties:
      FunctionName: !GetAtt ClipLambdaFunction.Arn
      Action: "lambda:InvokeFunction"
      Principal: "s3.amazonaws.com"
      SourceAccount: !Ref "AWS::AccountId"
      SourceArn: !Sub "arn:aws:s3:::${BucketName}"

Outputs:
  LambdaFunctionArn:
    Value: !GetAtt ClipLambdaFunction.Arn
